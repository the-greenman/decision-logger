  /experts:
    get:
      tags: [Experts]
      summary: List expert templates
      operationId: listExperts
      description: |
        List all expert templates (core and custom).
        Core experts are baked into the system, custom experts are user-defined.
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [core, custom]
          description: Filter by expert type
        - name: active
          in: query
          schema:
            type: boolean
          description: Filter by active status
      responses:
        '200':
          description: List of expert templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  experts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpertTemplate'

    post:
      tags: [Experts]
      summary: Create custom expert
      operationId: createExpert
      description: |
        Create a custom expert template with MCP access configuration.
        Core experts cannot be created via API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, displayName, promptTemplate, mcpAccess]
              properties:
                name:
                  type: string
                  example: "procurement-advisor"
                  description: Unique identifier (kebab-case)
                displayName:
                  type: string
                  example: "Procurement Advisor"
                description:
                  type: string
                  example: "Advises on vendor selection and procurement"
                promptTemplate:
                  type: string
                  description: Prompt template with variable placeholders
                mcpAccess:
                  $ref: '#/components/schemas/MCPAccess'
                outputSchema:
                  type: object
                  description: Optional JSON schema for output validation
      responses:
        '201':
          description: Expert created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertTemplate'
        '400':
          $ref: '#/components/responses/BadRequest'

  /experts/{expertId}:
    get:
      tags: [Experts]
      summary: Get expert template
      operationId: getExpert
      parameters:
        - name: expertId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Expert template details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertTemplate'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Experts]
      summary: Update custom expert
      operationId: updateExpert
      description: |
        Update a custom expert template. Core experts cannot be modified.
      parameters:
        - name: expertId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                description:
                  type: string
                promptTemplate:
                  type: string
                mcpAccess:
                  $ref: '#/components/schemas/MCPAccess'
                outputSchema:
                  type: object
                isActive:
                  type: boolean
      responses:
        '200':
          description: Expert updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertTemplate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Cannot modify core expert
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Experts]
      summary: Delete custom expert
      operationId: deleteExpert
      description: |
        Delete a custom expert template. Core experts cannot be deleted.
      parameters:
        - name: expertId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Expert deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        '403':
          description: Cannot delete core expert
        '404':
          $ref: '#/components/responses/NotFound'

  /mcp/servers:
    get:
      tags: [MCP]
      summary: List MCP servers
      operationId: listMCPServers
      description: List all registered MCP servers
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
          description: Filter by status
      responses:
        '200':
          description: List of MCP servers
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      $ref: '#/components/schemas/MCPServer'

    post:
      tags: [MCP]
      summary: Register MCP server
      operationId: registerMCPServer
      description: Register a new MCP server for expert access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, connectionConfig, capabilities]
              properties:
                name:
                  type: string
                  example: "vendor-database"
                  description: Unique server name
                type:
                  type: string
                  enum: [postgresql, sqlite, http, custom]
                connectionConfig:
                  type: object
                  description: Type-specific connection configuration
                  example:
                    host: "localhost"
                    database: "vendors"
                capabilities:
                  $ref: '#/components/schemas/MCPCapabilities'
      responses:
        '201':
          description: MCP server registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPServer'
        '400':
          $ref: '#/components/responses/BadRequest'

  /mcp/servers/{serverName}:
    get:
      tags: [MCP]
      summary: Get MCP server details
      operationId: getMCPServer
      parameters:
        - name: serverName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: MCP server details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPServer'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [MCP]
      summary: Update MCP server
      operationId: updateMCPServer
      parameters:
        - name: serverName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectionConfig:
                  type: object
                capabilities:
                  $ref: '#/components/schemas/MCPCapabilities'
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        '200':
          description: MCP server updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPServer'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [MCP]
      summary: Unregister MCP server
      operationId: unregisterMCPServer
      parameters:
        - name: serverName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: MCP server unregistered
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        '404':
          $ref: '#/components/responses/NotFound'

  /mcp/servers/{serverName}/tools:
    get:
      tags: [MCP]
      summary: List MCP server tools
      operationId: listMCPTools
      description: List all available tools for this MCP server
      parameters:
        - name: serverName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of tools
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      $ref: '#/components/schemas/MCPToolInfo'
        '404':
          $ref: '#/components/responses/NotFound'

  /mcp/servers/{serverName}/resources:
    get:
      tags: [MCP]
      summary: List MCP server resources
      operationId: listMCPResources
      description: List all available resources for this MCP server
      parameters:
        - name: serverName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of resources
          content:
            application/json:
              schema:
                type: object
                properties:
                  resources:
                    type: array
                    items:
                      type: string
                    example: ["policy://*", "archive://decisions/*"]
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    MeetingId:
      name: meetingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Meeting unique identifier

  schemas:
    Meeting:
      type: object
      required: [id, title, date, participants, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "Housing Coop Committee - Feb 2026"
        date:
          type: string
          format: date
          example: "2026-02-27"
        participants:
          type: array
          items:
            type: string
          example: ["Alice", "Bob", "Carol", "David"]
        status:
          type: string
          enum: [active, completed]
        createdAt:
          type: string
          format: date-time

    TranscriptSegment:
      type: object
      required: [id, meetingId, speaker, text, sequenceNumber, contexts, createdAt]
      properties:
        id:
          type: string
          format: uuid
        meetingId:
          type: string
          format: uuid
        timestamp:
          type: [string, "null"]
          example: "00:12:34"
        speaker:
          type: string
          example: "Alice"
        text:
          type: string
          example: "I think we should approve the roof repair budget"
        sequenceNumber:
          type: integer
          example: 42
        contexts:
          type: array
          items:
            type: string
          example: ["meeting:abc123", "decision:xyz789", "decision:xyz789:options"]
        createdAt:
          type: string
          format: date-time

    TranscriptChunk:
      type: object
      required: [id, meetingId, text, sequenceNumber, chunkStrategy, contexts, createdAt]
      properties:
        id:
          type: string
          format: uuid
        meetingId:
          type: string
          format: uuid
        rawTranscriptId:
          type: [string, "null"]
          format: uuid
        text:
          type: string
          example: "Alice: I think we should approve the budget increase..."
        speaker:
          type: [string, "null"]
          example: "Alice"
        sequenceNumber:
          type: integer
          example: 15
        startTime:
          type: [integer, "null"]
          description: Seconds from meeting start
          example: 930
        endTime:
          type: [integer, "null"]
          description: Seconds from meeting start
          example: 1050
        chunkStrategy:
          type: string
          enum: [semantic, fixed-time, speaker-turn, sentence, streaming]
          description: How this chunk was created
        tokenCount:
          type: [integer, "null"]
          example: 750
        wordCount:
          type: [integer, "null"]
          example: 560
        summary:
          type: [string, "null"]
          description: AI-generated summary of chunk
        topics:
          type: array
          items:
            type: string
          example: ["budget", "roof repair", "contractor"]
        contexts:
          type: array
          items:
            type: string
          description: Hierarchical context tags
          example: ["meeting:abc-123", "decision:xyz-789", "decision:xyz-789:options"]
        createdAt:
          type: string
          format: date-time

    FlaggedDecision:
      type: object
      required: [id, meetingId, suggestedTitle, segmentIds, status, source, createdAt]
      properties:
        id:
          type: string
          format: uuid
        meetingId:
          type: string
          format: uuid
        suggestedTitle:
          type: string
          example: "Approve roof repair budget"
        contextSummary:
          type: [string, "null"]
          example: "Committee discussed roof maintenance options and budget allocation"
        confidence:
          type: [number, "null"]
          minimum: 0
          maximum: 1
          example: 0.89
          description: Confidence score from 0-1 (null for manually created decisions)
        segmentIds:
          type: array
          items:
            type: string
            format: uuid
          description: Transcript segments associated with this decision
        status:
          type: string
          enum: [pending, active, logged, dismissed]
        source:
          type: string
          enum: [ai, manual]
          description: How this decision was flagged
        priority:
          type: integer
          default: 0
          example: 5
          description: Priority level (higher = more important)
        createdBy:
          type: [string, "null"]
          example: "Alice"
          description: User who manually created this decision (null for AI-flagged)
        createdAt:
          type: string
          format: date-time

    DecisionContext:
      type: object
      required: [id, meetingId, title, templateId, draftData, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        meetingId:
          type: string
          format: uuid
        flaggedDecisionId:
          type: [string, "null"]
          format: uuid
        title:
          type: string
          example: "Approve roof repair budget"
        templateId:
          type: string
          format: uuid
        activeField:
          type: [string, "null"]
          example: "options"
        lockedFields:
          type: object
          additionalProperties:
            type: object
            properties:
              value:
                type: string
              lockedAt:
                type: string
                format: date-time
          example:
            options:
              value: "Option 1: Full replacement..."
              lockedAt: "2026-02-27T15:30:00Z"
        draftData:
          type: object
          additionalProperties:
            type: string
          example:
            decision_statement: "Approve £45,000 budget for roof repair"
            decision_context: "Building requires maintenance..."
        status:
          type: string
          enum: [drafting, ready, logged]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DecisionLog:
      type: object
      required: [id, meetingId, decisionContextId, templateId, templateVersion, fields, decisionMethod, sourceSegmentIds, loggedAt, loggedBy]
      properties:
        id:
          type: string
          format: uuid
        meetingId:
          type: string
          format: uuid
        decisionContextId:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        templateVersion:
          type: integer
        fields:
          type: object
          additionalProperties:
            type: string
          example:
            decision_statement: "Approve £45,000 budget for roof repair"
            decision_context: "Building requires maintenance due to water damage"
            options: "Option 1: Full replacement for £45k, lasts 20 years\nOption 2: Patch repair for £12k, lasts 3 years"
        decisionMethod:
          type: object
          required: [type, details, actors]
          properties:
            type:
              type: string
              example: "consensus"
            details:
              type: string
              example: "All committee members agreed after discussion"
            actors:
              type: array
              items:
                type: string
              example: ["Alice", "Bob", "Carol", "David"]
        sourceSegmentIds:
          type: array
          items:
            type: string
            format: uuid
        loggedAt:
          type: string
          format: date-time
        loggedBy:
          type: string
          example: "Alice"

    DecisionTemplate:
      type: object
      required: [id, name, version, fields, isDefault, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Standard Decision"
        version:
          type: integer
          example: 1
        fields:
          type: array
          items:
            $ref: '#/components/schemas/TemplateField'
        isDefault:
          type: boolean
          description: Whether this is the default template (only one template can be default)
          example: true
        createdAt:
          type: string
          format: date-time

    TemplateField:
      type: object
      required: [id, name, label, required, order]
      properties:
        id:
          type: string
          example: "decision_statement"
        name:
          type: string
          example: "decision_statement"
        label:
          type: string
          example: "Decision Statement"
        description:
          type: [string, "null"]
          example: "The decision being made"
        required:
          type: boolean
        order:
          type: integer
          example: 1

    ExpertTemplate:
      type: object
      required: [id, name, displayName, type, promptTemplate, mcpAccess, isActive, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "policy-compliance"
          description: Unique identifier (kebab-case)
        displayName:
          type: string
          example: "Policy Compliance Expert"
        description:
          type: [string, "null"]
          example: "Ensures decisions align with organizational policies"
        type:
          type: string
          enum: [core, custom]
          description: Core experts are baked-in, custom are user-defined
        promptTemplate:
          type: string
          description: Prompt template with variable placeholders
        mcpAccess:
          $ref: '#/components/schemas/MCPAccess'
        outputSchema:
          type: [object, "null"]
          description: Optional JSON schema for output validation
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: [string, "null"]
          format: date-time
        createdBy:
          type: [string, "null"]

    MCPAccess:
      type: object
      required: [servers]
      properties:
        servers:
          type: array
          items:
            type: string
          example: ["policy-database", "decision-archive"]
          description: MCP servers this expert can access
        allowedTools:
          type: [array, "null"]
          items:
            type: string
          example: ["search_policies", "get_policy"]
          description: Optional restriction to specific tools
        allowedResources:
          type: [array, "null"]
          items:
            type: string
          example: ["policy://financial/*"]
          description: Optional restriction to specific resource patterns

    MCPServer:
      type: object
      required: [id, name, type, connectionConfig, capabilities, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "policy-database"
          description: Unique server name
        type:
          type: string
          enum: [postgresql, sqlite, http, custom]
        connectionConfig:
          type: object
          description: Type-specific connection configuration
          example:
            host: "localhost"
            database: "policies"
        capabilities:
          $ref: '#/components/schemas/MCPCapabilities'
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: [string, "null"]
          format: date-time

    MCPCapabilities:
      type: object
      required: [resources, tools]
      properties:
        resources:
          type: array
          items:
            type: string
          example: ["policy://*", "archive://decisions/*"]
          description: Resource URIs this server provides
        tools:
          type: array
          items:
            $ref: '#/components/schemas/MCPToolInfo'

    MCPToolInfo:
      type: object
      required: [name, description, inputSchema]
      properties:
        name:
          type: string
          example: "search_policies"
        description:
          type: string
          example: "Search for policies by query"
        inputSchema:
          type: object
          description: JSON schema for tool input

    ExpertAdviceHistory:
      type: object
      required: [id, decisionContextId, expertId, expertName, request, response, requestedAt]
      properties:
        id:
          type: string
          format: uuid
        decisionContextId:
          type: string
          format: uuid
        expertId:
          type: string
          format: uuid
        expertName:
          type: string
          example: "policy-compliance"
        request:
          type: object
          properties:
            focusArea:
              type: [string, "null"]
        response:
          $ref: '#/components/schemas/ExpertAdviceResponse'
        mcpToolsUsed:
          type: [array, "null"]
          items:
            type: string
          example: ["search_policies", "get_policy"]
        requestedAt:
          type: string
          format: date-time

    ExpertAdviceResponse:
      type: object
      required: [expertType, advice, concerns, recommendations, generatedAt]
      properties:
        expertType:
          type: string
          example: "policy-compliance"
        advice:
          type: string
          description: The expert's advice
          example: "This decision aligns with Policy 3.2 regarding capital expenditures..."
        concerns:
          type: array
          items:
            type: string
          description: Any concerns raised
          example: ["Budget exceeds quarterly limit", "Requires board approval"]
        recommendations:
          type: array
          items:
            type: string
          description: Specific recommendations
          example: ["Split into two phases", "Seek additional quotes"]
        relatedPolicies:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              relevance:
                type: string
          description: Related policies from MCP database
        relatedDecisions:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              title:
                type: string
              similarity:
                type: number
          description: Similar past decisions from archive
        generatedAt:
          type: string
          format: date-time

    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: "BadRequest"
        message:
          type: string
          example: "Invalid request parameters"
        details:
          type: object
          additionalProperties: true

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "BadRequest"
            message: "Invalid request parameters"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "NotFound"
            message: "Resource not found"
