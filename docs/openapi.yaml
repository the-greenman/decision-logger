openapi: 3.1.0
info:
  title: Decision Logger API
  version: 1.0.0
  description: |
    A context-driven decision logging system with LLM-assisted extraction, 
    iterative field refinement with locking, and structured decision logs.
  contact:
    name: Decision Logger Team

servers:
  - url: http://localhost:3000/api
    description: Local development server

tags:
  - name: Meetings
    description: Meeting management operations
  - name: Transcripts
    description: Transcript ingestion and retrieval
  - name: Contexts
    description: Decision and field context management
  - name: Decisions
    description: Decision workflow and logging
  - name: Templates
    description: Decision template management
  - name: Experts
    description: Expert template management (core and custom)
  - name: MCP
    description: MCP server management and discovery

paths:
  /meetings:
    post:
      tags: [Meetings]
      summary: Create a new meeting
      operationId: createMeeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, date, participants]
              properties:
                title:
                  type: string
                  example: "Housing Coop Committee - Feb 2026"
                date:
                  type: string
                  format: date
                  example: "2026-02-27"
                participants:
                  type: array
                  items:
                    type: string
                  example: ["Alice", "Bob", "Carol", "David"]
      responses:
        '201':
          description: Meeting created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      tags: [Meetings]
      summary: List all meetings
      operationId: listMeetings
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of meetings
          content:
            application/json:
              schema:
                type: object
                properties:
                  meetings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Meeting'
                  total:
                    type: integer

  /meetings/{meetingId}:
    get:
      tags: [Meetings]
      summary: Get meeting by ID
      operationId: getMeeting
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      responses:
        '200':
          description: Meeting details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          $ref: '#/components/responses/NotFound'

  /meetings/{meetingId}/status:
    patch:
      tags: [Meetings]
      summary: Update meeting status
      operationId: updateMeetingStatus
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, completed]
      responses:
        '200':
          description: Meeting updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          $ref: '#/components/responses/NotFound'

  /meetings/{meetingId}/transcripts/upload:
    post:
      tags: [Transcripts]
      summary: Upload complete transcript
      operationId: uploadTranscript
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [segments]
              properties:
                segments:
                  type: array
                  items:
                    type: object
                    required: [speaker, text]
                    properties:
                      timestamp:
                        type: string
                        example: "00:12:34"
                      speaker:
                        type: string
                        example: "Alice"
                      text:
                        type: string
                        example: "I think we should approve the roof repair budget"
      responses:
        '201':
          description: Transcript uploaded and processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  segmentIds:
                    type: array
                    items:
                      type: string
                      format: uuid
                  flaggedDecisions:
                    type: array
                    items:
                      $ref: '#/components/schemas/FlaggedDecision'
        '404':
          $ref: '#/components/responses/NotFound'

  /meetings/{meetingId}/transcripts/add:
    post:
      tags: [Transcripts]
      summary: Add single segment (immediate processing)
      operationId: addTranscriptSegment
      description: |
        Add a single transcript segment with immediate processing.
        Each segment is processed individually - creates chunk, generates embedding,
        and runs decision detection immediately.
        
        **Use this for:**
        - Adding historical segments from past meetings
        - Manual segment entry
        - Testing/debugging
        - When you need immediate feedback per segment
        
        **For live streaming, use /transcripts/stream instead** (more efficient).
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [speaker, text]
              properties:
                speaker:
                  type: string
                  example: "Bob"
                text:
                  type: string
                  example: "The contractor quoted £45,000 for full replacement"
                timestamp:
                  type: string
                  example: "00:15:22"
                sequenceNumber:
                  type: integer
                  example: 15
                  description: Optional sequence number for ordering
      responses:
        '201':
          description: Segment processed immediately
          content:
            application/json:
              schema:
                type: object
                properties:
                  chunkId:
                    type: string
                    format: uuid
                    description: Created chunk ID
                  sequenceNumber:
                    type: integer
                  contexts:
                    type: array
                    items:
                      type: string
                    example: ["meeting:abc123", "decision:xyz789"]
                  flaggedDecisions:
                    type: array
                    items:
                      $ref: '#/components/schemas/FlaggedDecision'
                    description: Any decisions detected in this segment

  /meetings/{meetingId}/transcripts/stream:
    post:
      tags: [Transcripts]
      summary: Stream segment (buffered processing)
      operationId: streamTranscriptSegment
      description: |
        Add a segment to the streaming buffer for optimized batch processing.
        Segments are buffered and intelligently chunked based on:
        - Token count (750+ tokens AND speaker change, or 1000+ tokens force)
        - Time elapsed (3 minutes timeout)
        
        **Use this for:**
        - Live meeting transcription
        - Real-time streaming from transcription services
        - When you want optimized chunking (fewer LLM calls)
        - When you want cost-efficient processing
        
        **Benefits over /add:**
        - Reduced LLM calls (batched processing)
        - Better chunk boundaries (respects speaker changes)
        - Lower cost (fewer embeddings generated)
        - Real-time status feedback
        
        **For historical/manual segments, use /transcripts/add instead**.
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [speaker, text, sequenceNumber]
              properties:
                timestamp:
                  type: string
                  example: "00:12:34"
                speaker:
                  type: string
                  example: "Alice"
                text:
                  type: string
                  example: "I think we should approve the budget increase."
                sequenceNumber:
                  type: integer
                  example: 42
      responses:
        '200':
          description: Segment buffered or chunk created
          content:
            application/json:
              schema:
                type: object
                properties:
                  buffering:
                    type: boolean
                    description: True if still buffering
                  bufferSize:
                    type: integer
                    description: Current buffer size
                  chunkCreated:
                    type: boolean
                    description: True if chunk was created from buffer
                  chunkId:
                    type: string
                    format: uuid
                  potentialDecision:
                    type: [object, "null"]
                    description: Quick pattern-matched potential decision
                    properties:
                      title:
                        type: string
                      confidence:
                        type: string
                        enum: [low, medium, high]
        '400':
          $ref: '#/components/responses/BadRequest'

  /meetings/{meetingId}/streaming/status:
    get:
      tags: [Transcripts]
      summary: Get streaming buffer status
      operationId: getStreamingStatus
      description: Get current status of streaming buffer for this meeting
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      responses:
        '200':
          description: Streaming status
          content:
            application/json:
              schema:
                type: object
                properties:
                  bufferSize:
                    type: integer
                    example: 5
                  totalTokens:
                    type: integer
                    example: 423
                  lastChunkAt:
                    type: [string, "null"]
                    format: date-time
                  totalChunks:
                    type: integer
                    example: 12
                  meetingDuration:
                    type: integer
                    description: Seconds since first segment
                    example: 1847

  /meetings/{meetingId}/streaming/flush:
    post:
      tags: [Transcripts]
      summary: Flush streaming buffer
      operationId: flushStreamingBuffer
      description: |
        Force process current streaming buffer into chunks.
        Useful when meeting ends or you want to process buffered content immediately.
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      responses:
        '200':
          description: Buffer flushed
          content:
            application/json:
              schema:
                type: object
                properties:
                  chunksCreated:
                    type: integer
                    example: 2
                  flaggedDecisions:
                    type: array
                    items:
                      $ref: '#/components/schemas/FlaggedDecision'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Transcripts]
      summary: Clear streaming buffer
      operationId: clearStreamingBuffer
      description: |
        Clear streaming buffer without processing (e.g., cancel meeting).
        This discards all buffered segments.
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      responses:
        '200':
          description: Buffer cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleared:
                    type: boolean
                  segmentsDiscarded:
                    type: integer

  /chunks:
    get:
      tags: [Transcripts]
      summary: Get chunks by context and/or topics
      operationId: getChunks
      description: |
        Retrieve transcript chunks filtered by:
        - Hierarchical context tags (workflow position)
        - Semantic topic tags (content)
        - Or both combined for precise retrieval
      parameters:
        - name: context
          in: query
          schema:
            type: string
          description: |
            Context tag to filter by (hierarchical).
            Examples:
            - meeting:abc-123 (all chunks from meeting)
            - decision:xyz-789 (all chunks for decision)
            - decision:xyz-789:options (chunks for options field)
          example: "decision:xyz-789:options"
        - name: topics
          in: query
          schema:
            type: string
          description: |
            Comma-separated topic keywords (semantic).
            Returns chunks tagged with ANY of the topics.
            Examples:
            - budget,contractor-quotes
            - risk-assessment,timeline
          example: "budget,contractor-quotes"
        - name: meetingId
          in: query
          schema:
            type: string
            format: uuid
          description: Optional - scope results to specific meeting
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [sequence, relevance, timestamp]
            default: sequence
      responses:
        '200':
          description: Filtered chunks
          content:
            application/json:
              schema:
                type: object
                properties:
                  chunks:
                    type: array
                    items:
                      $ref: '#/components/schemas/TranscriptChunk'
                  totalTokens:
                    type: integer
                  totalChunks:
                    type: integer
                  filters:
                    type: object
                    properties:
                      context:
                        type: [string, "null"]
                      topics:
                        type: array
                        items:
                          type: string
                      meetingId:
                        type: [string, "null"]

  /chunks/search:
    post:
      tags: [Transcripts]
      summary: Semantic search across chunks
      operationId: searchChunks
      description: |
        Search chunks using natural language query.
        Uses embedding similarity to find most relevant chunks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  example: "What did we discuss about contractor pricing?"
                  description: Natural language search query
                meetingId:
                  type: string
                  format: uuid
                  description: Optional - scope to specific meeting
                decisionContextId:
                  type: string
                  format: uuid
                  description: Optional - scope to specific decision
                limit:
                  type: integer
                  default: 10
                  description: Maximum chunks to return
                minRelevance:
                  type: number
                  default: 0.7
                  description: Minimum similarity score (0-1)
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: string
                  chunks:
                    type: array
                    items:
                      type: object
                      properties:
                        chunk:
                          $ref: '#/components/schemas/TranscriptChunk'
                        relevanceScore:
                          type: number
                          description: Similarity score 0-1
                          example: 0.89
                  totalResults:
                    type: integer

  /chunks/{chunkId}/tags:
    post:
      tags: [Transcripts]
      summary: Add context tags to chunk
      operationId: addChunkTags
      description: Manually add context tags to a chunk
      parameters:
        - name: chunkId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contexts]
              properties:
                contexts:
                  type: array
                  items:
                    type: string
                  example: ["decision:xyz:options", "decision:xyz:risks"]
      responses:
        '200':
          description: Tags added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptChunk'

    delete:
      tags: [Transcripts]
      summary: Remove context tags from chunk
      operationId: removeChunkTags
      parameters:
        - name: chunkId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contexts]
              properties:
                contexts:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Tags removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptChunk'

  /decision-contexts/{contextId}/fields/{fieldId}/transcript:
    get:
      tags: [Decisions]
      summary: Get field-specific transcript
      operationId: getFieldTranscript
      description: |
        Retrieve transcript chunks tagged for a specific decision field.
        Optimized for field regeneration - returns only relevant chunks.
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: fieldId
          in: path
          required: true
          schema:
            type: string
          example: "options"
        - name: includeNeighbors
          in: query
          schema:
            type: boolean
            default: false
          description: Include temporal neighbors for context
        - name: maxTokens
          in: query
          schema:
            type: integer
            default: 5000
          description: Maximum tokens to return
      responses:
        '200':
          description: Field-specific transcript
          content:
            application/json:
              schema:
                type: object
                properties:
                  fieldId:
                    type: string
                  chunks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        text:
                          type: string
                        speaker:
                          type: string
                        timestamp:
                          type: string
                        sequenceNumber:
                          type: integer
                        relevance:
                          type: number
                          description: Relevance score 0-1
                        tags:
                          type: array
                          items:
                            type: string
                  totalTokens:
                    type: integer
                  totalChunks:
                    type: integer
                  coverage:
                    type: string
                    example: "45 seconds of discussion"
        '404':
          $ref: '#/components/responses/NotFound'

  /decision-contexts/{contextId}/fields/{fieldId}/regenerate:
    post:
      tags: [Decisions]
      summary: Regenerate single field
      operationId: regenerateField
      description: |
        Regenerate a specific field using field-tagged transcript chunks.
        More efficient than full draft regeneration.
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: fieldId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                includeChunks:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Specific chunks to include (optional)
                additionalContext:
                  type: string
                  description: User guidance for regeneration
                  example: "Focus on cost implications"
                preserveExisting:
                  type: boolean
                  default: false
                  description: Merge with existing value or replace
      responses:
        '200':
          description: Field regenerated
          content:
            application/json:
              schema:
                type: object
                properties:
                  fieldId:
                    type: string
                  oldValue:
                    description: Previous field value
                  newValue:
                    description: Regenerated field value
                  sourceChunks:
                    type: array
                    items:
                      type: object
                      properties:
                        chunkId:
                          type: string
                          format: uuid
                        relevance:
                          type: number
                          description: Relevance score 0-1
                  tokensUsed:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'

  /meetings/{meetingId}/segments:
    get:
      tags: [Transcripts]
      summary: Get transcript segments
      operationId: getSegments
      parameters:
        - $ref: '#/components/parameters/MeetingId'
        - name: context
          in: query
          description: Filter by context tag
          schema:
            type: string
          example: "decision:xyz789:options"
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: List of segments
          content:
            application/json:
              schema:
                type: object
                properties:
                  segments:
                    type: array
                    items:
                      $ref: '#/components/schemas/TranscriptSegment'

  /context:
    get:
      tags: [Contexts]
      summary: Get global context state
      operationId: getGlobalContext
      description: |
        Returns the current global context including active meeting,
        active decision, and active field.
      responses:
        '200':
          description: Global context state
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeMeetingId:
                    type: [string, "null"]
                    format: uuid
                  activeDecisionId:
                    type: [string, "null"]
                    format: uuid
                  activeField:
                    type: [string, "null"]

  /context/meeting:
    post:
      tags: [Contexts]
      summary: Set active meeting
      operationId: setActiveMeeting
      description: |
        Sets the active meeting context. Subsequent operations that support
        meeting context will use this meeting by default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [meetingId]
              properties:
                meetingId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Active meeting set
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeMeetingId:
                    type: string
                    format: uuid
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Contexts]
      summary: Clear active meeting
      operationId: clearActiveMeeting
      responses:
        '200':
          description: Active meeting cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleared:
                    type: boolean

  /meetings/{meetingId}/context:
    get:
      tags: [Contexts]
      summary: Get meeting context state
      operationId: getContext
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      responses:
        '200':
          description: Current context state for this meeting
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeDecisionId:
                    type: [string, "null"]
                    format: uuid
                  activeField:
                    type: [string, "null"]

  /meetings/{meetingId}/context/decision:
    post:
      tags: [Contexts]
      summary: Set active decision context
      operationId: setDecisionContext
      description: |
        Creates a decision context from a flagged decision and sets it as active.
        If templateId is not provided, the default template will be used.
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [flaggedDecisionId]
              properties:
                flaggedDecisionId:
                  type: string
                  format: uuid
                  description: The flagged decision to promote to active context
                templateId:
                  type: [string, "null"]
                  format: uuid
                  description: The decision template to use (optional - uses default if not specified)
      responses:
        '200':
          description: Decision context set
          content:
            application/json:
              schema:
                type: object
                properties:
                  decisionContext:
                    $ref: '#/components/schemas/DecisionContext'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Contexts]
      summary: Clear decision context
      operationId: clearDecisionContext
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      responses:
        '200':
          description: Context cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleared:
                    type: boolean

  /meetings/{meetingId}/context/field:
    post:
      tags: [Contexts]
      summary: Set active field focus
      operationId: setFieldFocus
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decisionContextId, fieldId]
              properties:
                decisionContextId:
                  type: string
                  format: uuid
                fieldId:
                  type: string
                  example: "options"
      responses:
        '200':
          description: Field focus set
          content:
            application/json:
              schema:
                type: object
                properties:
                  decisionContext:
                    $ref: '#/components/schemas/DecisionContext'

    delete:
      tags: [Contexts]
      summary: Clear field focus
      operationId: clearFieldFocus
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      responses:
        '200':
          description: Field focus cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleared:
                    type: boolean

  /meetings/{meetingId}/flagged-decisions:
    get:
      tags: [Decisions]
      summary: Get flagged decisions for meeting
      operationId: getFlaggedDecisions
      parameters:
        - $ref: '#/components/parameters/MeetingId'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, active, logged, dismissed]
        - name: source
          in: query
          schema:
            type: string
            enum: [ai, manual]
          description: Filter by decision source
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [priority, createdAt, confidence]
            default: priority
          description: Sort order for results
      responses:
        '200':
          description: List of flagged decisions
          content:
            application/json:
              schema:
                type: object
                properties:
                  flagged:
                    type: array
                    items:
                      $ref: '#/components/schemas/FlaggedDecision'

    post:
      tags: [Decisions]
      summary: Manually create flagged decision
      operationId: createFlaggedDecision
      description: |
        Manually flag a decision from transcript segments.
        Use this when you identify a decision yourself rather than relying on AI detection.
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, segmentIds, createdBy]
              properties:
                title:
                  type: string
                  example: "Which platform should we adopt?"
                  description: Decision title/question
                contextSummary:
                  type: string
                  example: "Discussion about platform migration options"
                segmentIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Transcript segments related to this decision
                priority:
                  type: integer
                  default: 0
                  example: 5
                  description: Priority level (higher = more important)
                createdBy:
                  type: string
                  example: "Alice"
                  description: User who identified this decision
      responses:
        '201':
          description: Decision flagged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlaggedDecision'
        '400':
          $ref: '#/components/responses/BadRequest'

  /flagged-decisions/{flaggedId}:
    get:
      tags: [Decisions]
      summary: Get flagged decision details
      operationId: getFlaggedDecision
      parameters:
        - name: flaggedId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Flagged decision details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlaggedDecision'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Decisions]
      summary: Update flagged decision
      operationId: updateFlaggedDecision
      description: |
        Update flagged decision details like title, priority, or context summary.
        Useful for refining AI-flagged or manually-created decisions.
      parameters:
        - name: flaggedId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: "Which platform should we adopt?"
                contextSummary:
                  type: string
                  example: "Updated summary after further discussion"
                priority:
                  type: integer
                  example: 8
                  description: Update priority level
                segmentIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Update associated transcript segments
      responses:
        '200':
          description: Flagged decision updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlaggedDecision'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Decisions]
      summary: Dismiss flagged decision
      operationId: dismissFlaggedDecision
      description: |
        Dismiss a flagged decision (sets status to 'dismissed').
        Use this to remove false positives or decisions you don't want to process.
      parameters:
        - name: flaggedId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Decision dismissed
          content:
            application/json:
              schema:
                type: object
                properties:
                  dismissed:
                    type: boolean
        '404':
          $ref: '#/components/responses/NotFound'

  /flagged-decisions/{flaggedId}/priority:
    patch:
      tags: [Decisions]
      summary: Update decision priority
      operationId: updateDecisionPriority
      description: |
        Quick endpoint to update just the priority of a flagged decision.
        Useful for prioritizing which decisions to process first.
      parameters:
        - name: flaggedId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [priority]
              properties:
                priority:
                  type: integer
                  example: 10
                  description: Priority level (higher = more important)
      responses:
        '200':
          description: Priority updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlaggedDecision'
        '404':
          $ref: '#/components/responses/NotFound'

  /decision-contexts/{contextId}:
    get:
      tags: [Decisions]
      summary: Get decision context
      operationId: getDecisionContext
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Decision context details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionContext'
        '404':
          $ref: '#/components/responses/NotFound'

  /decision-contexts/{contextId}/generate-draft:
    post:
      tags: [Decisions]
      summary: Generate draft decision log
      operationId: generateDraft
      description: |
        Uses LLM to extract decision details from all decision-tagged segments
        and fill template fields. Only generates unlocked fields.
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Draft generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  draftData:
                    type: object
                    additionalProperties:
                      type: string
                    example:
                      decision_statement: "Approve £45,000 budget for roof repair"
                      decision_context: "Building requires maintenance..."
                      options: "Option 1: Full replacement...\nOption 2: Patch repair..."

  /decision-contexts/{contextId}/regenerate:
    post:
      tags: [Decisions]
      summary: Regenerate draft (unlocked fields only)
      operationId: regenerateDraft
      description: |
        Regenerates all unlocked fields using latest segments.
        Locked fields are preserved.
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Draft regenerated
          content:
            application/json:
              schema:
                type: object
                properties:
                  draftData:
                    type: object
                    additionalProperties:
                      type: string

  /decision-contexts/{contextId}/lock-field:
    post:
      tags: [Decisions]
      summary: Lock a field
      operationId: lockField
      description: |
        Locks a field to prevent LLM regeneration.
        The current value is preserved.
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fieldId]
              properties:
                fieldId:
                  type: string
                  example: "options"
      responses:
        '200':
          description: Field locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionContext'

  /decision-contexts/{contextId}/unlock-field:
    post:
      tags: [Decisions]
      summary: Unlock a field
      operationId: unlockField
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fieldId]
              properties:
                fieldId:
                  type: string
                  example: "options"
      responses:
        '200':
          description: Field unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionContext'

  /decision-contexts/{contextId}/update-field:
    post:
      tags: [Decisions]
      summary: Manually update a field value
      operationId: updateField
      description: |
        Manually set or update a specific field value in the draft.
        This is for providing direct feedback/corrections to the AI-generated content.
        The field does not need to be unlocked to update it.
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fieldId, value]
              properties:
                fieldId:
                  type: string
                  example: "options"
                  description: The field to update
                value:
                  type: string
                  example: "Option 1: Full replacement\nOption 2: Patch repair"
                  description: The new value for the field
      responses:
        '200':
          description: Field updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionContext'
        '404':
          $ref: '#/components/responses/NotFound'

  /decision-contexts/{contextId}/expert-advice:
    get:
      tags: [Decisions]
      summary: Get expert advice history
      operationId: getExpertAdviceHistory
      description: |
        Retrieve all expert advice consultations for this decision context.
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Expert advice history
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpertAdviceHistory'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Decisions]
      summary: Request expert AI advice on decision
      operationId: requestExpertAdvice
      description: |
        Request AI expert consultation on the decision using predefined expert prompts.
        The AI expert has access to policy database and decision log archive via MCP.
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expertType]
              properties:
                expertType:
                  type: string
                  description: Type of expert advice to request (can be core or custom expert name)
                  example: "policy-compliance"
                focusArea:
                  type: string
                  description: Optional specific area to focus on
                  example: "budget implications"
      responses:
        '200':
          description: Expert advice generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertAdviceResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /decision-contexts/{contextId}/log:
    post:
      tags: [Decisions]
      summary: Log final decision
      operationId: logDecision
      description: |
        Creates a final decision log with decision method and actors.
        This marks the decision as complete.
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, details, actors, loggedBy]
              properties:
                type:
                  type: string
                  example: "consensus"
                  description: Type of decision method
                details:
                  type: string
                  example: "All committee members agreed"
                  description: Free-form text describing the decision method
                actors:
                  type: array
                  items:
                    type: string
                  example: ["Alice", "Bob", "Carol"]
                  description: People who made the decision
                loggedBy:
                  type: string
                  example: "Alice"
      responses:
        '201':
          description: Decision logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionLog'

  /decision-logs/{logId}:
    get:
      tags: [Decisions]
      summary: Get decision log
      operationId: getDecisionLog
      description: |
        Get a final decision log. Decision logs are immutable once created.
      parameters:
        - name: logId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Decision log details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionLog'
        '404':
          $ref: '#/components/responses/NotFound'

  /decision-logs/{logId}/export:
    get:
      tags: [Decisions]
      summary: Export decision log (simple)
      operationId: exportDecisionLog
      description: |
        Simple export with format parameter.
        For advanced options, use POST /decision-logs/{logId}/export
      parameters:
        - name: logId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [json, markdown, html, pdf, csv, txt]
          description: Export format
        - name: template
          in: query
          schema:
            type: string
            enum: [minimal, standard, formal, executive, compliance]
            default: standard
          description: Template style
        - name: inline
          in: query
          schema:
            type: boolean
            default: false
          description: Display inline vs download
      responses:
        '200':
          description: Exported decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionLog'
            text/markdown:
              schema:
                type: string
                example: |
                  # Approve roof repair budget
                  
                  **Meeting:** Housing Coop Committee
                  **Date:** 2026-02-27
                  ...
            text/html:
              schema:
                type: string
            application/pdf:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
            text/plain:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Decisions]
      summary: Export decision log (advanced)
      operationId: exportDecisionLogAdvanced
      description: |
        Advanced export with full customization options.
        Supports templates, field selection, and format-specific settings.
      parameters:
        - name: logId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format]
              properties:
                format:
                  type: string
                  enum: [json, markdown, html, pdf, csv, docx, txt]
                options:
                  type: object
                  properties:
                    includeExpertAdvice:
                      type: boolean
                      default: true
                    includeTranscriptReferences:
                      type: boolean
                      default: false
                    includeMetadata:
                      type: boolean
                      default: true
                    includeMeetingContext:
                      type: boolean
                      default: true
                    template:
                      type: string
                      enum: [minimal, standard, formal, executive, compliance, custom]
                      default: standard
                    sections:
                      type: array
                      items:
                        type: string
                      description: Which sections to include
                      example: ["statement", "context", "options", "stakeholders"]
                    excludeFields:
                      type: array
                      items:
                        type: string
                      description: Fields to omit
                    customFields:
                      type: object
                      additionalProperties: true
                      description: Custom metadata to include
                      example:
                        organizationName: "Housing Cooperative Ltd"
                        documentNumber: "DEC-2026-001"
                    dateFormat:
                      type: string
                      enum: [ISO, US, UK, custom]
                      default: ISO
                    timezone:
                      type: string
                      example: "Europe/London"
                    filename:
                      type: string
                      example: "decision-2026-001.pdf"
                    inline:
                      type: boolean
                      default: false
                    pdfOptions:
                      type: object
                      properties:
                        pageSize:
                          type: string
                          enum: [A4, Letter, Legal]
                          default: A4
                        orientation:
                          type: string
                          enum: [portrait, landscape]
                          default: portrait
                        margins:
                          type: string
                          enum: [narrow, normal, wide]
                          default: normal
                        includePageNumbers:
                          type: boolean
                          default: true
                        includeTableOfContents:
                          type: boolean
                          default: false
                        signatureFields:
                          type: boolean
                          default: false
                        watermark:
                          type: string
                          example: "OFFICIAL RECORD"
                    htmlOptions:
                      type: object
                      properties:
                        standalone:
                          type: boolean
                          default: true
                        inlineCSS:
                          type: boolean
                          default: true
                        theme:
                          type: string
                          enum: [light, dark, print]
                          default: light
                        responsive:
                          type: boolean
                          default: true
                    markdownOptions:
                      type: object
                      properties:
                        flavor:
                          type: string
                          enum: [github, commonmark, extended]
                          default: github
                        includeYAMLFrontmatter:
                          type: boolean
                          default: false
                        headingLevel:
                          type: integer
                          minimum: 1
                          maximum: 3
                          default: 1
      responses:
        '200':
          description: Exported decision with custom formatting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionLog'
            text/markdown:
              schema:
                type: string
            text/html:
              schema:
                type: string
            application/pdf:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /decision-logs/export/batch:
    post:
      tags: [Decisions]
      summary: Batch export multiple decisions
      operationId: batchExportDecisionLogs
      description: |
        Export multiple decision logs at once.
        Can combine into single document or separate files.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format]
              properties:
                logIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Specific decision log IDs to export
                meetingId:
                  type: string
                  format: uuid
                  description: Export all decisions from this meeting
                dateRange:
                  type: object
                  properties:
                    start:
                      type: string
                      format: date
                    end:
                      type: string
                      format: date
                  description: Export decisions within date range
                format:
                  type: string
                  enum: [json, markdown, html, pdf, csv, docx, txt]
                options:
                  type: object
                  properties:
                    combineIntoSingle:
                      type: boolean
                      default: false
                      description: Combine all decisions into one document
                    includeTableOfContents:
                      type: boolean
                      default: false
                      description: Add TOC (for combined documents)
                    template:
                      type: string
                      enum: [minimal, standard, formal, executive, compliance]
                      default: standard
                    customFields:
                      type: object
                      additionalProperties: true
                      example:
                        meetingTitle: "Board Meeting - February 2026"
                        documentNumber: "MIN-2026-02"
      responses:
        '200':
          description: Batch export completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        logId:
                          type: string
                          format: uuid
                        filename:
                          type: string
                        url:
                          type: string
                        size:
                          type: integer
            application/pdf:
              schema:
                type: string
                format: binary
            application/zip:
              description: Multiple files as ZIP archive
              schema:
                type: string
                format: binary

  /templates:
    get:
      tags: [Templates]
      summary: List decision templates
      operationId: listTemplates
      responses:
        '200':
          description: List of templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
