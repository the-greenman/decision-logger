services:
  ollama:
    image: ollama/ollama:latest
    container_name: decision-logger-ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    # Expose host NVIDIA GPU. Requires `nvidia-container-toolkit` on the host
    # and `nvidia-ctk runtime configure --runtime=docker && systemctl restart docker`.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama-models:
    driver: local
