services:
  postgres:
    image: postgres:16-alpine
    container_name: decision-logger-db
    environment:
      POSTGRES_USER: decision_logger
      POSTGRES_PASSWORD: decision_logger
      POSTGRES_DB: decision_logger_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decision_logger -d decision_logger_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: Drizzle Studio for DB inspection
  # Uncomment if you want a web UI for the database
  # drizzle-studio:
  #   image: node:20-alpine
  #   container_name: decision-logger-studio
  #   working_dir: /app
  #   volumes:
  #     - .:/app
  #   command: npx drizzle-kit studio
  #   ports:
  #     - "4983:4983"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://decision_logger:dev_password@postgres:5432/decision_logger_dev

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: decision-logger-api
    environment:
      DATABASE_URL: postgresql://decision_logger:decision_logger@postgres:5432/decision_logger_dev
      PORT: 3000
      NODE_ENV: production
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-opus-4-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      USE_TEMPLATE_PROMPT: ${USE_TEMPLATE_PROMPT:-false}
    ports:
      - "${COMPOSE_API_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: node /app/apps/api/dist/index.js

volumes:
  postgres_data:
    driver: local
